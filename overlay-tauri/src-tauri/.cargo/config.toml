# Cargo configuration for overlay-tauri
#
# ARM64 Windows only: pins the MSVC linker so MSYS2's /usr/bin/link.exe is not
# picked up by mistake. x64 machines can ignore this section entirely.
[target.aarch64-pc-windows-msvc]
linker = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Tools\\MSVC\\14.44.35207\\bin\\Hostarm64\\arm64\\link.exe"
ar     = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Tools\\MSVC\\14.44.35207\\bin\\Hostarm64\\arm64\\lib.exe"

# ─── Machine-local overrides ─────────────────────────────────────────────────
# For ARM64 Windows + OneDrive repos, create the file
#   overlay-tauri/src-tauri/.cargo/config.local.toml
# and add:
#
#   [build]
#   # Moves build cache outside OneDrive (prevents "output path not writable" errors)
#   target-dir = "C:\\Users\\<you>\\AppData\\Local\\overlay-tauri-target"
#
#   [env]
#   # ARM64 Windows SDK lib paths (only needed if the linker can't auto-detect them)
#   LIB = "C:\\Program Files (x86)\\...\\lib\\arm64;...\\ucrt\\arm64;...\\um\\arm64"
#
# x64 Windows: no config.local.toml needed — standard MSVC toolchain auto-detects
# all library paths through the Windows registry.
